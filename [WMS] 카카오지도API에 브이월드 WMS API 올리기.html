<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>카카오지도 + VWorld 편집지적도</title>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f4d6e06f93c80761a8243d5829fbe00&autoload=false"></script>

  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { width:80%; margin:16px auto; }
    #mapWrap { position:relative; width:100%; height:800px; border-radius:12px; overflow:hidden; }
    #map4 { width:100%; height:100%; }

    /* WMS overlay layer */
    #wmsOverlay {
      position:absolute; inset:0;
      z-index:10;
      pointer-events:none;/
    }
    #wmsImg {
      position:absolute; inset:0;
      width:100%; height:100%;
      opacity:0.85;
    }

    .panel {
      display:flex; flex-wrap:wrap; gap:12px; align-items:center;
      padding:10px 12px; border:1px solid #e5e7eb; border-radius:10px;
      background: rgba(255,255,255,.92);
      margin-bottom:12px;
    }
    .panel label { display:flex; align-items:center; gap:8px; }
    .panel input[type="range"]{ width:180px; }
    button { padding:8px 10px; border:1px solid #e5e7eb; border-radius:8px; background:#fff; cursor:pointer; }
    .hint { color:#6b7280; font-size:12px; margin-left:auto; }
    .status { width:100%; font-size:12px; color:#374151; }
    .status code { background:#f3f4f6; padding:2px 6px; border-radius:6px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">
      <label><input id="toggle" type="checkbox" checked /> 편집지적도 표시</label>

      <label>
        투명도
        <input id="opacity" type="range" min="0" max="100" value="85" />
        <span id="opacityVal">85%</span>
      </label>

      <button id="refreshBtn" type="button">WMS 새로고침</button>

      <div class="hint">Kakao: EPSG:4326 / WMS: EPSG:4326(BBOX 축순서 예외 적용)</div>
      <div class="status" id="status"></div>
    </div>

    <div id="mapWrap">
      <div id="map4"></div>
      <div id="wmsOverlay">
        <img id="wmsImg" alt="vworld-wms" />
      </div>
    </div>
  </div>

<script>
(() => {
  const VWORLD_KEY = "EEEEEEEE-EEEE-EEEE-EEEE-EEEEEEEEEEEE";

  const LAYERS = ["lt_c_landinfobasemap"];
  const STYLES = ["lt_c_landinfobasemap"];

  const CRS = "EPSG:4326";

  const elMap = document.getElementById("map4");
  const elOverlay = document.getElementById("wmsOverlay");
  const elImg = document.getElementById("wmsImg");
  const elToggle = document.getElementById("toggle");
  const elOpacity = document.getElementById("opacity");
  const elOpacityVal = document.getElementById("opacityVal");
  const elRefreshBtn = document.getElementById("refreshBtn");
  const elStatus = document.getElementById("status");

  const state = {
    enabled: true,
    opacity: 0.85
  };

  function debounce(fn, delay) {
    let t = null;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }

  function setStatus(html) {
    elStatus.innerHTML = html || "";
  }

  function buildWmsUrl({ bbox, width, height }) {
    const params = new URLSearchParams({
      service: "WMS",
      version: "1.3.0",
      request: "GetMap",

      key: VWORLD_KEY,

      layers: LAYERS.join(","),
      styles: STYLES.join(","),

      crs: CRS,
      bbox: bbox,

      width: String(width),
      height: String(height),

      format: "image/png",
      transparent: "TRUE",
      exceptions: "text/xml",

      // 캐시 방지(선택)
      _t: String(Date.now())
    });

    return "https://api.vworld.kr/req/wms?" + params.toString();
  }

  function updateWms(map) {
    if (!state.enabled) return;

    const bounds = map.getBounds();
    if (!bounds) return;

    const sw = bounds.getSouthWest();
    const ne = bounds.getNorthEast();

    const bbox = [
      sw.getLat(), // ymin
      sw.getLng(), // xmin
      ne.getLat(), // ymax
      ne.getLng()  // xmax
    ].join(",");

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const width = Math.max(64, Math.round(elMap.clientWidth * dpr));
    const height = Math.max(64, Math.round(elMap.clientHeight * dpr));

    const url = buildWmsUrl({ bbox, width, height });

    setStatus(`WMS 요청: <code>${CRS}</code> / BBOX: <code>${bbox}</code> / SIZE: <code>${width}x${height}</code>`);

    elImg.src = url;
  }

  function applyOpacity() {
    elImg.style.opacity = String(state.opacity);
    elOpacityVal.textContent = Math.round(state.opacity * 100) + "%";
  }

  function init() {
    const map = new kakao.maps.Map(elMap, {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 4
    });

    map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

    elImg.onload = () => {
    };
    elImg.onerror = () => {
      setStatus(elStatus.innerHTML + `<br/>이미지 로드 실패. <code>elImg.src</code>를 새 탭에 열어 (XML 에러 여부) 확인하세요.`);
      console.error("WMS image load failed. URL:", elImg.src);
    };

    const refresh = debounce(() => updateWms(map), 150);
    kakao.maps.event.addListener(map, "idle", refresh);
    window.addEventListener("resize", refresh);

    elToggle.addEventListener("change", () => {
      state.enabled = elToggle.checked;
      elOverlay.style.display = state.enabled ? "block" : "none";
      if (state.enabled) updateWms(map);
    });

    elOpacity.addEventListener("input", () => {
      state.opacity = Number(elOpacity.value) / 100;
      applyOpacity();
    });

    elRefreshBtn.addEventListener("click", () => updateWms(map));

    applyOpacity();
    updateWms(map);
  }

  // kakao SDK 로드 완료 후 초기화 (kakao is not defined 방지)
  if (!window.kakao || !kakao.maps || !kakao.maps.load) {
    console.error("Kakao SDK not loaded. script src / 네트워크 차단 / CSP 등을 확인하세요.");
    setStatus("Kakao SDK 로드 실패: Network 탭에서 sdk.js 200 OK 확인 필요");
    return;
  }

  kakao.maps.load(init);
})();
</script>
</body>
</html>
